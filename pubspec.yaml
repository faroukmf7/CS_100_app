name: attendance_app
description: Class Attendance Management App - CS 100 Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6
  get_storage: ^2.1.1

  # HTTP & Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.3

  # Geolocation
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # UI & Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

  # Utils
  uuid: ^4.3.3
  logger: ^2.3.0
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  open_file: ^3.3.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
